name: Copper News Daily

on:
  schedule:
    # 09:00 GMT+8 = 01:00 UTC
    - cron: '0 1 * * *'
  workflow_dispatch:   # allow manual run from the GitHub Actions UI

jobs:
  send-news:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write   # needed to commit News_List.md back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run copper news bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python main.py

      - name: Commit updated News_List.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add News_List.md
          git diff --staged --quiet || git commit -m "Update News_List.md [skip ci]"
          git push
